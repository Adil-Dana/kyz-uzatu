<!DOCTYPE html>
<html lang="kk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Қыз ұзату</title>
  <style>
    body {margin:0;font-family:Arial, sans-serif;background:linear-gradient(to bottom,#000,#7f1d1d,#000);color:#fff;text-align:center}
    .section{padding:60px 20px}
    h1{font-size:48px}
    h2{font-size:32px}
    .timer{display:flex;justify-content:center;gap:20px;margin-top:20px}
    .card{background:rgba(255,255,255,0.1);padding:15px;border-radius:12px}
    button{padding:12px 20px;border:none;border-radius:10px;color:#fff;font-size:16px;cursor:pointer}
    .yes{background:#22c55e}
    .no{background:#ef4444}
    a.btn{display:inline-block;margin-top:20px;background:#f43f5e;padding:12px 20px;border-radius:10px;color:#fff;text-decoration:none}
  </style>
</head>
<body>

<div class="section">
  <h1>Қыз ұзату тойы</h1>
  <p>Аружан & Нұрсұлтан</p>
  <p>20 мамыр 2026 | 18:00</p>

  <div class="timer">
    <div><div id="days"></div><small>күн</small></div>
    <div><div id="hours"></div><small>сағат</small></div>
    <div><div id="minutes"></div><small>мин</small></div>
  </div>
</div>

<div class="section">
  <h2>Бағдарлама</h2>
  <div class="card">17:30 – Қонақтарды қарсы алу</div>
  <div class="card">18:00 – Той басталуы</div>
  <div class="card">19:00 – Қыз ұзату</div>
  <div class="card">20:00 – Дастархан</div>
</div>

<div class="section">
  <h2>Мекенжай</h2>
  <p>Астана, Ақ Орда мейрамханасы</p>
  <a class="btn" href="https://2gis.kz/astana" target="_blank">Карта ашу</a>
</div>

<div class="section">
  <h2>Қатысасыз ба?</h2>
  <button class="yes" onclick="window.open('https://wa.me/77771234567?text=Мен%20тойға%20келемін')">Иә</button>
  <button class="no" onclick="window.open('https://wa.me/77771234567?text=Келе%20алмаймын')">Жоқ</button>
</div>

<audio autoplay loop>
  <source src="music.mp3" type="audio/mpeg">
</audio>

<script>
const target = new Date("2026-05-20T18:00:00");
setInterval(()=>{
  const now = new Date();
  const diff = target - now;
  document.getElementById('days').innerText = Math.floor(diff/(1000*60*60*24));
  document.getElementById('hours').innerText = Math.floor((diff/(1000*60*60))%24);
  document.getElementById('minutes').innerText = Math.floor((diff/(1000*60))%60);
},1000);
</script>

</body>
</html>
