<!DOCTYPE html>
<html lang="kk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Қыз ұзату</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600&family=Great+Vibes&family=Montserrat:wght@300;400;500&display=swap" rel="stylesheet">

  <style>
    body {
      margin:0;
      font-family:'Montserrat', sans-serif;
      background: linear-gradient(180deg,#fff8fb,#ffeef3);
      color:#5b4633;
    }

    .wrapper {
      max-width:520px;
      margin:0 auto;
      padding:20px;
    }

    .card {
      border-radius:25px;
      overflow:hidden;
      position:relative;
      box-shadow:0 10px 30px rgba(0,0,0,0.1);
      margin-bottom:20px;
    }

    /* 🔥 ДВА ФОТО В ОДНОМ ФОНЕ */
    .hero-bg {
      height:600px;
      background-image:
        url('photo-girl.jpg'),
        url('photo2.jpg');

      background-size:
        100% 50%,
        100% 50%;

      background-position:
        top,
        bottom;

      background-repeat:no-repeat;
      position:relative;
    }

    .overlay {
      position:absolute;
      inset:0;
      background:linear-gradient(rgba(255,255,255,0.4), rgba(255,255,255,0.7));
    }

    .content {
      position:absolute;
      inset:0;
      display:flex;
      flex-direction:column;
      justify-content:center;
      align-items:center;
      text-align:center;
      padding:20px;
    }

    h1 {
      font-family:'Cormorant Garamond', serif;
      font-size:40px;
      margin:10px 0;
    }

    .names {
      font-size:22px;
      margin-top:10px;
    }

    .timer div {
      margin:4px 0;
    }

    .btn {
      margin-top:15px;
      padding:10px 20px;
      border:none;
      border-radius:12px;
      background:#d48fa3;
      color:white;
      font-size:15px;
      cursor:pointer;
    }

  </style>
</head>

<body>

<div class="wrapper">

  <!-- ОДИН ОСТРОВОК С ДВУМЯ ФОТО -->
  <div class="card">
    <div class="hero-bg">
      <div class="overlay"></div>

      <div class="content">
        <h1>Қыз ұзату</h1>
        <div class="names">Аружан & Нұрсұлтан</div>
        <div>20 мамыр 2026</div>

        <div class="timer">
          <div id="days"></div>
          <div id="hours"></div>
          <div id="minutes"></div>
        </div>

        <button class="btn" onclick="window.open('https://wa.me/77771234567')">
          Жауап беру
        </button>
      </div>
    </div>
  </div>

</div>

<script>
const target = new Date("2026-05-20T18:00:00");

setInterval(()=>{
  const now = new Date();
  const diff = target - now;

  document.getElementById('days').innerText = Math.floor(diff/(1000*60*60*24)) + ' күн';
  document.getElementById('hours').innerText = Math.floor((diff/(1000*60*60))%24) + ' сағат';
  document.getElementById('minutes').innerText = Math.floor((diff/(1000*60))%60) + ' мин';
},1000);
</script>

</body>
</html>
